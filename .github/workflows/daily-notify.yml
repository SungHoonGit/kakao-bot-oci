name: Daily Kakao Notification

on:
  schedule:
    - cron: '5 0 * * *'   # KST 09:05 = UTC 00:05
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout job-scraper (daily data source)
        uses: actions/checkout@v4
        with:
          repository: SungHoonGit/job-scraper
          token: ${{ secrets.GH_PAT }}
          path: job-scraper

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Create config.json
        run: |
          cat > config.json << 'EOF'
          {
            "kakao": {
              "rest_api_key": "${{ secrets.KAKAO_REST_API_KEY }}",
              "access_token": "",
              "refresh_token": "${{ secrets.KAKAO_REFRESH_TOKEN }}"
            }
          }
          EOF

      - name: Send Kakao notification from daily results
        run: python3 scripts/send_daily.py job-scraper/daily/react job-scraper/daily/java
