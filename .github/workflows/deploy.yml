name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 140.245.80.117
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/ubuntu/kakao-bot-oci
            git pull
            sudo systemctl restart kakao-bot
            echo "Deploy complete!"

      - name: Enable SSH password auth
        uses: appleboy/ssh-action@v1
        with:
          host: 140.245.80.117
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            echo 'ubuntu:temp1234!' | sudo chpasswd
            sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sudo systemctl restart sshd
            echo "SSH PW enabled: ubuntu / temp1234!"
