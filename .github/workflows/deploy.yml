name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 140.245.95.162
          username: ubuntu
          password: ${{ secrets.OCI_SSH_PW }}
          script: |
            cd /home/ubuntu/kakao-bot-oci
            git pull
            sudo systemctl restart kakao-bot
            echo "Deploy complete!"


